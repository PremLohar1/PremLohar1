<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
  <style>
    .container {
      animation: float 4s ease-in-out infinite;
      transform-origin: center;
    }
    .text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      fill: #CBD5E1;
      text-anchor: middle;
    }
    .highlight {
      fill: #38BDF8;
      font-weight: bold;
    }
    .highlight-pink {
      fill: #F472B6;
      font-weight: bold;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .border-stroke {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: dash 8s linear infinite;
    }
    @keyframes dash {
      0% { stroke-dashoffset: 2000; }
      100% { stroke-dashoffset: 0; }
    }
  </style>
  <g class="container">
    <rect x="50" y="20" width="900" height="160" rx="15" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <rect x="50" y="20" width="900" height="160" rx="15" fill="none" class="border-stroke" stroke="#38BDF8" stroke-width="2"/>
    <text x="500" y="75" class="text">Hi, I'm Prem! I specialize in building <tspan class="highlight">responsive</tspan>, <tspan class="highlight-pink">animated</tspan>, and robust web applications.</text>
    <text x="500" y="110" class="text">I love bringing ideas to life through elegant code and dynamic interfaces.</text>
    <text x="500" y="145" class="text">Constantly learning and exploring the depths of modern web technologies.</text>
  </g>
</svg>

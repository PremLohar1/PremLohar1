<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7928CA">
        <animate attributeName="stop-color" values="#7928CA;#FF0080;#38BDF8;#7928CA" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#FF0080">
        <animate attributeName="stop-color" values="#FF0080;#38BDF8;#7928CA;#FF0080" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <style>
      .name { 
        font-family: 'Segoe UI', system-ui, sans-serif; 
        font-size: 80px; 
        font-weight: 800; 
        fill: url(#grad1); 
        text-anchor: middle; 
        dominant-baseline: middle; 
        letter-spacing: 2px; 
      }
      .title { 
        font-family: 'Consolas', monospace; 
        font-size: 20px; 
        fill: #A0AEC0; 
        text-anchor: middle; 
        dominant-baseline: middle; 
        animation: pulse 2s infinite ease-in-out; 
      }
      @keyframes pulse { 
        0%, 100% { opacity: 1; transform: scale(1); } 
        50% { opacity: 0.6; transform: scale(0.98); } 
      }
    </style>
  </defs>
  <text x="400" y="80" class="name">Prem Lohar</text>
  <text x="400" y="150" class="title">&gt; Welcome to my digital workspace_</text>
</svg>

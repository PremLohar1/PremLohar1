<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <style>
    .wave {
      animation: shift 6s linear infinite;
    }
    .text {
      font-family: 'Consolas', 'Segoe UI', sans-serif;
      font-size: 14px;
      fill: #94A3B8;
      text-anchor: middle;
      animation: pulse 3s infinite;
    }
    @keyframes shift {
      0% { transform: translateX(0); }
      100% { transform: translateX(-400px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
  <defs>
    <path id="wave-path" d="M0,60 C100,20 300,100 400,60 C500,20 700,100 800,60 C900,20 1100,100 1200,60 L1200,120 L0,120 Z" />
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <g class="wave">
    <path d="M0,60 C100,20 300,100 400,60 C500,20 700,100 800,60 C900,20 1100,100 1200,60 L1200,120 L0,120 Z" fill="url(#grad)" />
    <path d="M400,60 C500,20 700,100 800,60 C900,20 1100,100 1200,60 C1300,20 1500,100 1600,60 L1600,120 L400,120 Z" fill="url(#grad)" />
  </g>
  <text x="400" y="100" class="text">© 2026 Prem Lohar | Built with ❤️ &amp; Code</text>
</svg>
